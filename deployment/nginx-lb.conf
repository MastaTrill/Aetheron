events {
  worker_connections 4096;
}

http {
  upstream aetheron-backend {
    least_conn;
    
    # US East
    server aetheron-us-east:3000 max_fails=3 fail_timeout=30s;
    server aetheron-us-east:3000 backup;
    
    # US West
    server aetheron-us-west:3000 max_fails=3 fail_timeout=30s;
    
    # EU West
    server aetheron-eu-west:3000 max_fails=3 fail_timeout=30s;
    
    # AP Southeast
    server aetheron-ap-southeast:3000 max_fails=3 fail_timeout=30s;
  }

  # Geo-based routing
  geo $closest_region {
    default          us-east;
    
    # North America
    US               us-east;
    CA               us-west;
    MX               us-west;
    
    # Europe
    GB               eu-west;
    DE               eu-west;
    FR               eu-west;
    IT               eu-west;
    ES               eu-west;
    
    # Asia Pacific
    SG               ap-southeast;
    JP               ap-southeast;
    CN               ap-southeast;
    AU               ap-southeast;
    IN               ap-southeast;
  }

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  # Cache configuration
  proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=aetheron_cache:100m max_size=1g inactive=60m;

  server {
    listen 80;
    listen [::]:80;
    server_name aetheron.io *.aetheron.io;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
  }

  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aetheron.io *.aetheron.io;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/aetheron.crt;
    ssl_certificate_key /etc/nginx/ssl/aetheron.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate limiting
    limit_req zone=api_limit burst=20 nodelay;
    limit_conn conn_limit 10;

    # API endpoints
    location /api/ {
      proxy_pass http://aetheron-backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Region $closest_region;
      
      proxy_cache_bypass $http_upgrade;
      
      # Timeouts
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }

    # WebSocket support
    location /ws {
      proxy_pass http://aetheron-backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      
      proxy_read_timeout 86400;
    }

    # Static files
    location /static/ {
      alias /var/www/static/;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location /health {
      access_log off;
      proxy_pass http://aetheron-backend/health;
      proxy_set_header Host $host;
    }

    # Monitoring endpoint (internal only)
    location /metrics {
      allow 10.0.0.0/8;
      deny all;
      proxy_pass http://aetheron-backend/metrics;
    }

    # Default location
    location / {
      proxy_pass http://aetheron-backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      
      # Caching
      proxy_cache aetheron_cache;
      proxy_cache_valid 200 10m;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      add_header X-Cache-Status $upstream_cache_status;
    }
  }
}
