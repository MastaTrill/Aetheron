version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: aetheron-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - ETHEREUM_RPC=${ETHEREUM_RPC}
      - MOONPAY_API_KEY=${MOONPAY_API_KEY}
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - BUNDLER_URL=${BUNDLER_URL}
      - PAYMASTER_URL=${PAYMASTER_URL}
    depends_on:
      - mongodb
      - redis
    networks:
      - aetheron-network
    volumes:
      - ./logs:/app/logs

  mongodb:
    image: mongo:7
    container_name: aetheron-mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - aetheron-network

  redis:
    image: redis:7-alpine
    container_name: aetheron-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - aetheron-network

  nginx:
    image: nginx:alpine
    container_name: aetheron-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - aetheron-network

networks:
  aetheron-network:
    driver: bridge

volumes:
  mongodb-data:
  redis-data:
