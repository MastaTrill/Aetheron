<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aetheron Wallet</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    .container {
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .balance-card {
      background: rgba(255, 255, 255, 0.15);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .balance-label {
      font-size: 12px;
      opacity: 0.8;
      margin-bottom: 8px;
    }

    .balance-amount {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .balance-usd {
      font-size: 14px;
      opacity: 0.8;
    }

    .address {
      background: rgba(0, 0, 0, 0.2);
      padding: 12px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      word-break: break-all;
      margin-bottom: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .address:hover {
      background: rgba(0, 0, 0, 0.3);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    button {
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: border-color 0.2s;
    }

    .tab.active {
      border-bottom-color: #fff;
    }

    .transactions {
      max-height: 200px;
      overflow-y: auto;
    }

    .transaction {
      background: rgba(255, 255, 255, 0.1);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .transaction-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .transaction-type {
      font-weight: 600;
    }

    .transaction-amount {
      font-weight: 700;
    }

    .transaction-address {
      font-size: 11px;
      opacity: 0.7;
      font-family: 'Courier New', monospace;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      padding: 20px;
      z-index: 1000;
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 24px;
      border-radius: 16px;
      max-width: 320px;
      width: 100%;
    }

    .modal h2 {
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 14px;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .btn-cancel {
      background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">⚡</div>
      <h1>Aetheron Wallet</h1>
    </div>

    <div class="balance-card">
      <div class="balance-label">Total Balance</div>
      <div class="balance-amount" id="balance">0.00</div>
      <div class="balance-usd" id="balanceUSD">$0.00 USD</div>
    </div>

    <div class="address" id="address" title="Click to copy">
      0x0000...0000
    </div>

    <div class="actions">
      <button id="sendBtn">Send</button>
      <button id="receiveBtn">Receive</button>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="transactions">Transactions</div>
      <div class="tab" data-tab="settings">Settings</div>
    </div>

    <div class="tab-content" id="transactionsContent">
      <div class="transactions" id="transactionsList">
        <div class="transaction">
          <div class="transaction-header">
            <span class="transaction-type">Sent</span>
            <span class="transaction-amount">-10.5 AETH</span>
          </div>
          <div class="transaction-address">To: 0x742d35Cc...</div>
        </div>
      </div>
    </div>

    <div class="tab-content" id="settingsContent" style="display: none;">
      <button id="exportBtn">Export Private Key</button>
      <button id="lockBtn" style="margin-top: 12px;">Lock Wallet</button>
    </div>
  </div>

  <!-- Send Modal -->
  <div class="modal" id="sendModal">
    <div class="modal-content">
      <h2>Send AETH</h2>
      <div class="form-group">
        <label>To Address</label>
        <input type="text" id="sendAddress" placeholder="0x...">
      </div>
      <div class="form-group">
        <label>Amount</label>
        <input type="number" id="sendAmount" placeholder="0.0" step="0.01">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancelSend">Cancel</button>
        <button id="confirmSend">Send</button>
      </div>
    </div>
  </div>

  <!-- Receive Modal -->
  <div class="modal" id="receiveModal">
    <div class="modal-content">
      <h2>Receive AETH</h2>
      <p style="margin-bottom: 16px;">Share your address to receive AETH:</p>
      <div class="address" id="receiveAddress">0x0000...0000</div>
      <button id="closeReceive" style="margin-top: 16px; width: 100%;">Close</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
